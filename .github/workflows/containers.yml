name: Build & push container

# Builds the ultimaWTExp image and pushes it to Docker Hub and GHCR.
# Requires two repository secrets for the Docker Hub push:
#   DOCKERHUB_USERNAME  — your Docker Hub user (e.g. ebareke)
#   DOCKERHUB_TOKEN     — a Docker Hub access token (NOT stored in the repo)
# GHCR uses the built-in GITHUB_TOKEN. Only static values + secrets are passed
# to actions via `with:` / `env:` — no untrusted event input reaches a shell.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images (false = build only)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths: ['Dockerfile', 'environment.yml', 'bin/**']
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build image
    runs-on: ubuntu-latest
    env:
      IMAGE: ultimawtexp
      VERSION: '1.0.0'
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
