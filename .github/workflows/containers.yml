name: Build & push container

# Builds the ultimaWTExp image and pushes it to GHCR (always, via the built-in
# GITHUB_TOKEN) and Docker Hub (best-effort, only if the DOCKERHUB_* secrets
# authenticate). GHCR publishing is therefore never blocked by a Docker Hub
# credential problem.
#
# Docker Hub push needs two repository secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub user (e.g. ebareke)
#   DOCKERHUB_TOKEN     — a Docker Hub access token with Read/Write
# Only static values + secrets reach the actions via `with:` — no untrusted
# event input is interpolated into a shell.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['Dockerfile', 'environment.yml', 'bin/**']
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build image
    runs-on: ubuntu-latest
    env:
      IMAGE: ultimawtexp
      VERSION: '1.0.0'
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- GHCR: always (built-in token) ---
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ultimawtexp:1.0.0
            ghcr.io/${{ github.repository_owner }}/ultimawtexp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Docker Hub: best-effort (reuses the cached build) ---
      - name: Log in to Docker Hub
        id: dhlogin
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: steps.dhlogin.outcome == 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ultimawtexp:1.0.0
            ${{ secrets.DOCKERHUB_USERNAME }}/ultimawtexp:latest
          cache-from: type=gha

      - name: Note Docker Hub outcome
        if: steps.dhlogin.outcome != 'success'
        run: echo "::warning::Docker Hub login failed or secrets unset — pushed to GHCR only. Verify DOCKERHUB_USERNAME / DOCKERHUB_TOKEN."
