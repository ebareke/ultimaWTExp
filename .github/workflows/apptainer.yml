name: Apptainer image (HPC)

# Builds the Docker image in-job, converts it to an Apptainer/Singularity SIF
# straight from the local Docker daemon (so it does NOT depend on a published
# GHCR/Docker Hub image existing), smoke-tests it, and optionally publishes the
# SIF to GHCR as an OCI artifact (oras://). Pre-seed an HPC cache from GHCR, e.g.:
#   apptainer pull oras://ghcr.io/ebareke/ultimawtexp-apptainer:1.0.0
#
# Safety: only static values + the built-in GITHUB_TOKEN are referenced; no
# untrusted event input reaches a shell.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push SIF to GHCR'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  APPTAINER_VERSION: '1.3.6'
  SIF_NAME: ultimawtexp
  SIF_TAG: '1.0.0'
  LOCAL_IMAGE: ultimawtexp:1.0.0

jobs:
  build-sif:
    name: build + test SIF
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      ACTOR: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h /

      - name: Build the Docker image
        run: docker build -t "$LOCAL_IMAGE" .

      - name: Install Apptainer (pinned .deb — no JS action)
        run: |
          set -euxo pipefail
          cd /tmp
          wget -q "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb"
          sudo apt-get update
          sudo apt-get install -y "./apptainer_${APPTAINER_VERSION}_amd64.deb"
          apptainer --version

      - name: Build SIF from the local Docker daemon
        run: |
          set -euxo pipefail
          df -h /
          apptainer build "${SIF_NAME}.sif" "docker-daemon://${LOCAL_IMAGE}"

      - name: Smoke test under Apptainer
        run: apptainer exec "${SIF_NAME}.sif" STAR --version

      - name: Publish to GHCR
        if: ${{ inputs.push }}
        run: |
          set -euxo pipefail
          printf '%s' "$GHCR_TOKEN" \
            | apptainer registry login -u "$ACTOR" --password-stdin oras://ghcr.io
          apptainer push "${SIF_NAME}.sif" \
            "oras://ghcr.io/${OWNER}/${SIF_NAME}-apptainer:${SIF_TAG}"
