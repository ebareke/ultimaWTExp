# MultiQC configuration for ultimaWTExp.
title: "ultimaWTExp RNA-seq report"
subtitle: "FASTQ to biological interpretation"
intro_text: >
  Aggregated quality control for the ultimaWTExp RNA-seq pipeline: read QC,
  trimming, alignment, duplication, RNA composition, coverage, strandedness,
  library complexity and quantification.

report_comment: >
  Generated by the ultimaWTExp Nextflow pipeline
  (https://github.com/ebareke/ultimaWTExp).

show_analysis_paths: false
show_analysis_time: true

module_order:
  - fastqc:
      name: "FastQC (raw)"
      path_filters: ["*raw*_fastqc.zip"]
  - fastp
  - cutadapt
  - star
  - hisat2
  - samtools
  - picard
  - qualimap
  - rseqc
  - preseq
  - featureCounts
  - salmon

table_columns_visible:
  FastQC:
    percent_duplicates: True
    percent_gc: True
    total_sequences: True

export_plots: true
